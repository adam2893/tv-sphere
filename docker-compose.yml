version: "3.8"

services:
  tv-sphere:
    image: adam28693/tv-sphere:latest
    container_name: tv-sphere
    restart: unless-stopped
    ports:
      - "7401:3000"
    volumes:
      - tvsphere_data:/app/db
    environment:
      - DATABASE_URL=file:/app/db/tvsphere.db
      - STREAMLINK_PATH=/usr/local/bin/streamlink
      # Uncomment below for specific timezone
      # - TZ=Australia/Sydney
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  tvsphere_data:
    driver: local
