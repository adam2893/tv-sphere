version: '3.8'

services:
  tv-sphere:
    build: .
    container_name: tv-sphere
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PROXY_SECRET_KEY=${PROXY_SECRET_KEY:-change-me-to-a-real-secret}
      - CACHE_TIMEOUT=300
      - STREAM_CACHE_DURATION=1800
      - MAX_CONCURRENT_RESOLVERS=2
      - MAX_GLOBAL_CONCURRENT_RESOLVERS=2
    volumes:
      - ./cache:/app/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
